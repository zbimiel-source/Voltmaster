<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="VoltMaster">
    <meta name="theme-color" content="#0f172a">
    
    <link rel="apple-touch-icon" href="icon.png"> 
    <link rel="apple-touch-icon" href="icon.jpg">
    
    <title>VoltMaster - Ucz się, nie scrolluj</title>
    
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --accent: #8b5cf6; --success: #22c55e; --error: #ef4444; --fire: #f97316; --xp: #3b82f6; --sector: #10b981; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow-x: hidden; padding-top: env(safe-area-inset-top); }
        
        header { display: flex; flex-direction: column; padding: 15px 20px 10px; gap: 10px; }
        .top-row { display: flex; justify-content: space-between; align-items: center; }
        .stats-container { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end;}
        .stat-badge { padding: 6px 12px; border-radius: 20px; font-size: 0.9rem; font-weight: 800; display: flex; align-items: center; gap: 5px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .streak-badge { background: rgba(249, 115, 22, 0.15); color: var(--fire); }
        .level-badge { background: rgba(59, 130, 246, 0.15); color: var(--xp); }
        .sector-badge { background: rgba(16, 185, 129, 0.15); color: var(--sector); }
        
        .xp-bar-container { margin: 0 20px 15px; height: 6px; background: rgba(255,255,255,0.1); border-radius: 4px; overflow: hidden; }
        .xp-bar-fill { height: 100%; background: var(--xp); width: 0%; transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        
        #app-container { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 0 20px 20px; overflow-y: auto; }
        .card { background: var(--card); border-radius: 24px; padding: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.4); width: 100%; max-width: 400px; margin-top: 10px;}
        .lesson-tag { color: var(--accent); font-size: 0.8rem; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; display: block; }
        h2 { margin-top: 0; font-size: 1.3rem; margin-bottom: 15px; }
        p { line-height: 1.6; color: #cbd5e1; font-size: 1.05rem; }
        
        .quiz-option { background: rgba(255,255,255,0.05); border: 2px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 16px; margin: 12px 0; cursor: pointer; transition: all 0.3s; font-weight: 600; font-size: 1.05rem; }
        .quiz-option.correct { background: rgba(34, 197, 94, 0.2); border-color: var(--success); color: var(--success); }
        .quiz-option.wrong { background: rgba(239, 68, 68, 0.2); border-color: var(--error); color: var(--error); transform: translateX(5px); }
        
        .next-btn { background: var(--accent); color: white; border: none; padding: 16px; border-radius: 16px; width: 100%; font-size: 1.1rem; font-weight: bold; margin-top: 15px; display: none; cursor: pointer; box-shadow: 0 5px 15px rgba(139, 92, 246, 0.4); }
        .next-btn:active { transform: scale(0.98); }
        
        /* Ekran Awansu Sektora */
        #sector-unlock-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.95); z-index: 100; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px; box-sizing: border-box;}
        .unlock-icon { font-size: 4rem; margin-bottom: 20px; }
    </style>
</head>
<body>
    <header>
        <div class="top-row">
            <span style="font-weight: 900; font-size: 1.5rem; letter-spacing: -1px;">VoltMaster</span>
            <div class="stats-container">
                <div class="stat-badge streak-badge" id="streak-display">🔥 0</div>
                <div class="stat-badge level-badge" id="level-display">Lvl 1</div>
            </div>
        </div>
        <div class="stat-badge sector-badge" style="justify-content: center;" id="sector-display">Sektor 1: Początkujący</div>
    </header>
    
    <div class="xp-bar-container">
        <div class="xp-bar-fill" id="xp-bar"></div>
    </div>
    
    <div id="app-container">
        <div class="card" id="lesson-card">
            </div>
    </div>

    <div id="sector-unlock-modal">
        <div class="unlock-icon">🔓⚡</div>
        <h1 style="color: white;">Nowy Sektor Odblokowany!</h1>
        <p id="unlock-desc" style="color: var(--sector); font-weight: bold; font-size: 1.2rem;"></p>
        <p style="color: #cbd5e1; max-width: 300px;">Pytania z nowego sektora zostały właśnie dodane do Twojej talii. Poziom trudności rośnie.</p>
        <button class="next-btn" style="display: block; max-width: 300px;" onclick="closeUnlockModal()">Lecimy dalej!</button>
    </div>

            { s: 1, tag: "Moc", t: "Waty (W)", c: "Moc to P = U * I. Grzałka 230V, prąd 10A. Jaka moc?", o: ["2300 W", "23 W", "1000 W"], a: 0 },

            { s: 1, tag: "Obwody", t: "Zwarcia", c: "Zwarcie następuje, gdy prąd omija obciążenie (np. żarówkę). Co się wtedy dzieje z oporem obwodu?", o: ["Spada prawie do zera", "Rośnie nieskończenie", "Nie zmienia się"], a: 0 },
            { s: 1, tag: "Teoria", t: "Kierunek prądu", c: "Elektrony płyną od minusa do plusa. Jaki jest umowny kierunek prądu w inżynierii?", o: ["Od plusa do minusa", "Od minusa do plusa", "Zmienia się"], a: 0 },
            { s: 1, tag: "Materiały", t: "Przewodniki", c: "Który materiał z poniższych NIE jest przewodnikiem prądu?", o: ["Miedź", "Woda destylowana", "Słona woda"], a: 1 },
            { s: 1, tag: "Obwody", t: "Połączenie szeregowe", c: "Łącząc dwie baterie 1.5V szeregowo (jedna za drugą), uzyskasz napięcie:", o: ["1.5V", "3.0V", "0V"], a: 1 },
            { s: 1, tag: "Moc", t: "Rachunki", c: "Płacisz za prąd w kWh. Czego to jednostka?", o: ["Mocy", "Energii", "Natężenia"], a: 1 },

            { s: 2, tag: "Elementy", t: "Kondensator", c: "Gromadzi i oddaje ładunek błyskawicznie. Mierzymy go w:", o: ["Faradach (F)", "Henrach (H)", "Ohmach (Ω)"], a: 0 },
            { s: 2, tag: "Półprzewodniki", t: "Tranzystor", c: "Może działać jako wzmacniacz sygnału lub jako...", o: ["Elektroniczny przełącznik", "Izolator", "Bateria"], a: 0 },
            { s: 2, tag: "Optoelektronika", t: "Dioda LED", c: "LED wymaga rezystora w szeregu. Dlaczego?", o: ["By świeciła na inny kolor", "By ograniczyć prąd, by się nie spaliła", "Dla ozdoby"], a: 1 },

            { s: 2, tag: "Podzespoły", t: "Przekaźnik", c: "To mechaniczny przełącznik sterowany elektromagnesem. Pozwala:", o: ["Małym prądem sterować ogromnym prądem", "Zmieniać AC na DC", "Generować prąd"], a: 0 },
            { s: 2, tag: "Oznaczenia", t: "Paski Rezystora", c: "Kolorowe paski na oporniku służą do:", o: ["Oznaczenia producenta", "Odczytania wartości oporu", "Odczytania napięcia maksymalnego"], a: 1 },
            { s: 2, tag: "Komponenty", t: "Potencjometr", c: "To element używany np. w gałce głośności. Czym jest?", o: ["Tranzystorem", "Rezystorem o zmiennym oporze", "Kondensatorem"], a: 1 },

            { s: 3, tag: "Pomiary", t: "Woltomierz", c: "Jak podłączasz miernik, by zmierzyć napięcie na żarówce?", o: ["Szeregowo", "Równolegle", "Do uziemienia"], a: 1 },
            { s: 3, tag: "Pomiary", t: "Amperomierz", c: "Mierzenie prądu (A) wymaga podłączenia miernika:", o: ["Szeregowo (przecinając kabel)", "Równolegle", "Tylko do bieguna plusowego"], a: 0 },
            { s: 3, tag: "Instalacje", t: "Kolor kabla L", c: "Kabel fazowy (L) pod napięciem w UE ma zazwyczaj kolor:", o: ["Niebieski", "Żółto-zielony", "Brązowy lub czarny"], a: 2 },
            { s: 3, tag: "Instalacje", t: "Kabel PE", c: "Żółto-zielony kabel to uziemienie (PE). Jego celem jest:", o: ["Odprowadzenie prądu na obudowę", "Zabezpieczenie przed porażeniem (zwarcie do ziemi)", "Zasilanie lamp"], a: 1 },
            { s: 3, tag: "Zabezpieczenia", t: "Wyłącznik RCD", c: "Różnicówka w domu zadziała, gdy:", o: ["Prąd z gniazdka ucieknie inną drogą (np. przez ciało do ziemi)", "Zrobisz zwarcie", "Podłączysz za dużo urządzeń"], a: 0 },
            { s: 3, tag: "Miernictwo", t: "Test ciągłości", c: "Opcja z 'piszczkiem' na multimetrze sprawdza czy:", o: ["W kablu jest napięcie", "Kabel nie jest przerwany (opór ~0)", "Prąd płynie szybko"], a: 1 },
            { s: 3, tag: "Bezpieczeństwo", t: "Porażenie", c: "Co tak naprawdę zabija podczas porażenia?", o: ["Tylko bardzo wysokie napięcie (V)", "Przepływający prąd (A) np. rzędu 50mA przez serce", "Częstotliwość"], a: 1 },
            { s: 3, tag: "Instalacje", t: "Przekrój kabla", c: "Im grubszy przewód miedziany, tym jego opór (R):", o: ["Rośnie", "Maleje", "Nie zmienia się"], a: 1 },
            { s: 3, tag: "Instrukcje", t: "Zasada jednej ręki", c: "Przy pracy z wysokim napięciem jedną rękę trzyma się w kieszeni, aby:", o: ["Prąd nie przepłynął z ręki do ręki, przez serce", "Mniej się pocić", "Łatwiej łapać upadające narzędzia"], a: 0 },
            { s: 3, tag: "Zabezpieczenia", t: "Bezpiecznik B16", c: "Popularny w domu bezpiecznik nadprądowy B16 rozłączy obwód, gdy pobór przekroczy około:", o: ["16 Amperów", "16 Watów", "16 Voltów"], a: 0 },

            // --- SEKTOR 4: INŻYNIER (Lvl 15+) ---
            { s: 4, tag: "Fizyka", t: "Transformator", c: "Urządzenie to pozwala zmieniać napięcie. Działa WYŁĄCZNIE dla:", o: ["Prądu DC", "Prądu AC", "Baterii litowych"], a: 1 },
            { s: 4, tag: "AC", t: "Częstotliwość sieci", c: "W europejskich gniazdkach prąd zmienia kierunek z częstotliwością:", o: ["60 Hz", "50 Hz", "100 Hz"], a: 1 },
            { s: 4, tag: "Teoria", t: "Moc bierna", c: "W sieciach AC występuje moc czynna i bierna. Moc bierna to:", o: ["Moc która wykonuje pracę (np. świeci)", "Energia pulsująca między źródłem a odbiornikiem (np. cewką), która nie wykonuje użytecznej pracy", "Moc w bateriach"], a: 1 },
            { s: 4, tag: "Teoria", t: "Napięcie skuteczne RMS", c: "Mówimy, że w gniazdku jest 230V. To napięcie RMS (skuteczne). Napięcie szczytowe w fali wynosi:", o: ["Dokładnie 230V", "Około 325V", "115V"], a: 1 },
            { s: 4, tag: "Silniki", t: "Silnik indukcyjny", c: "Klatkowy silnik trójfazowy jest najpopularniejszy w przemyśle, ponieważ:", o: ["Nie posiada szczotek i jest niemal bezawaryjny", "Zasilany jest z USB", "Ma największą prędkość"], a: 0 },
            { s: 4, tag: "Trójfaza", t: "Przesunięcie fazowe", c: "W prądzie trójfazowym, fale napięcia są przesunięte względem siebie o:", o: ["90 stopni", "120 stopni", "180 stopni"], a: 1 },
            { s: 4, tag: "Elementy", t: "Triak", c: "Zamiast przekaźnika do sterowania prądem AC (np. ściemniacz światła) inżynier użyje:", o: ["Tranzystora NPN", "Triaka", "Kondensatora elektrolitycznego"], a: 1 },
            { s: 4, tag: "Pojemność", t: "Szeregowe kondensatory", c: "Jeśli połączysz kondensatory szeregowo, ich całkowita pojemność:", o: ["Zwiększa się", "Zmniejsza się", "Jest sumowana"], a: 1 },
            { s: 4, tag: "Cewki", t: "Szeregowe cewki", c: "Jeśli połączysz cewki szeregowo, ich indukcyjność całkowita:", o: ["Maleje", "Rośnie (sumuje się)", "Znika"], a: 1 },
            { s: 4, tag: "Przesył", t: "Wysokie napięcie", c: "Dlaczego prąd między miastami przesyła się na bardzo wysokim napięciu (np. 110kV)?", o: ["Bo elektrony szybciej lecą", "By zmniejszyć natężenie prądu (I) i zredukować straty cieplne na kablach (I^2*R)", "Bo kable są grubsze"], a: 1 },

            // --- SEKTOR 5: MASTER - CYFRÓWKA I MIKROKONTROLERY (Lvl 20+) ---
            { s: 5, tag: "Cyfrowe", t: "System Binarany", c: "Elektronika cyfrowa operuje na zerach i jedynkach. W napięciach zazwyczaj 1 logiczna to:", o: ["Napięcie bliskie zeru", "Napięcie zasilania (np. 3.3V lub 5V)", "Prąd zmienny"], a: 1 },
            { s: 5, tag: "Bramki", t: "Bramka AND", c: "Bramka AND na wyjściu daje sygnał '1' tylko wtedy, gdy:", o: ["Oba wejścia mają stan '1'", "Przynajmniej jedno wejście ma '1'", "Oba wejścia mają '0'"], a: 0 },
            { s: 5, tag: "Sygnały", t: "Modulacja PWM", c: "Mikrokontroler steruje jasnością LED używając PWM. Co to jest?", o: ["Zmiana napięcia analogowego z 5V na 3V", "Bardzo szybkie włączanie i wyłączanie zasilania ze zmiennym współczynnikiem wypełnienia", "Zmiana koloru światła"], a: 1 },

            { s: 5, tag: "Architektura", t: "Pull-up", c: "Rezystor podciągający (pull-up) przycisku zapewnia, że pin mikrokontrolera:", o: ["Nie ma 'latającego' stanu (pływającego) gdy przycisk nie jest wciśnięty", "Pobiera więcej prądu", "Zabezpiecza przed piorunami"], a: 0 },

            { s: 5, tag: "Bramki", t: "Bramka XOR", c: "Exclusive OR (XOR) daje jedynkę, gdy:", o: ["Tylko jedno z wejść jest równe 1 (stany są różne)", "Oba są równe 1", "Żadne wejście nie jest podłączone"], a: 0 },
            { s: 5, tag: "Mikrokontrolery", t: "Przerwania (Interrupts)", c: "Hardware'owe przerwanie w kodzie sprawia, że:", o: ["Układ natychmiastowo rzuca to co robi i wykonuje szybką funkcję w odpowiedzi na pin", "Program się zawiesza i resetuje", "Pobór mocy spada do zera"], a: 0 },
            { s: 5, tag: "Zasilanie", t: "Stabilizator LDO", c: "Zasilając Arduino z 9V, na pokładzie jest stabilizator robiący 5V. Różnica (4V) uchodzi jako:", o: ["Fale radiowe", "Ciepło (LDO to liniowy stabilizator)", "Dodatkowa energia do baterii"], a: 1 }
        ];

        let userStats = {
            streak: parseInt(localStorage.getItem('vm_streak') || '0'),
            level: parseInt(localStorage.getItem('vm_level') || '1'),
            xp: parseInt(localStorage.getItem('vm_xp') || '0'),
            lastVisit: localStorage.getItem('vm_lastVisit') || '',
            unlockedSector: 1
        };

        const XP_PER_LEVEL = 100;
        const XP_REWARD = 25; 

        let questionDeck = [];

        // --- SILNIK SEKTORÓW ---
        const sectorNames = {
            1: "Sektor 1: Początkujący",
            2: "Sektor 2: Amator",
            3: "Sektor 3: Praktyk",
            4: "Sektor 4: Inżynier",
            5: "Sektor 5: Master"
        };

        function calculateSector() {
            let newSector = 1;
            if (userStats.level >= 20) newSector = 5;
            else if (userStats.level >= 15) newSector = 4;
            else if (userStats.level >= 10) newSector = 3;
            else if (userStats.level >= 5) newSector = 2;

            if (newSector > userStats.unlockedSector) {
                userStats.unlockedSector = newSector;
                showUnlockModal(newSector);
                questionDeck = []; // Wymusza przetasowanie talii, by wtasować nowe pytania
            }
        }

        function getNextQuestionIndex() {
            if (questionDeck.length === 0) {
                // Filtrujemy lekcje tylko do odblokowanych sektorów
                let availableLessons = [];
                for (let i = 0; i < lessons.length; i++) {
                    if (lessons[i].s <= userStats.unlockedSector) {
                        availableLessons.push(i);
                    }
                }
                
                // Tasowanie
                questionDeck = [...availableLessons];
                for (let i = questionDeck.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [questionDeck[i], questionDeck[j]] = [questionDeck[j], questionDeck[i]];
                }
            }
            return questionDeck.pop();
        }

        function initApp() {
            calculateSector(); // Oblicz sektor na starcie w razie zmiany levelu poza apką
            checkStreak();
            updateUI();
            renderRandomLesson();
        }

        function checkStreak() {
            const today = new Date().toDateString();
            if (userStats.lastVisit !== today) {
                let yesterday = new Date();
                yesterday.setDate(yesterday.getDate() - 1);
                if (userStats.lastVisit === yesterday.toDateString()) userStats.streak++;
                else if (userStats.lastVisit !== "") userStats.streak = 1;
                else userStats.streak = 1;
                userStats.lastVisit = today;
                saveStats();
            }
        }

        function addXP(amount) {
            userStats.xp += amount;
            if (userStats.xp >= XP_PER_LEVEL) {
                userStats.level++;
                userStats.xp -= XP_PER_LEVEL;
                calculateSector(); // Sprawdź, czy nowy lvl odblokował sektor
            }
            saveStats();
            updateUI();
        }

        function saveStats() {
            localStorage.setItem('vm_streak', userStats.streak);
            localStorage.setItem('vm_level', userStats.level);
            localStorage.setItem('vm_xp', userStats.xp);
            localStorage.setItem('vm_lastVisit', userStats.lastVisit);
        }

        function updateUI() {
            document.getElementById('streak-display').innerText = `🔥 ${userStats.streak}`;
            document.getElementById('level-display').innerText = `Lvl ${userStats.level}`;
            document.getElementById('sector-display').innerText = sectorNames[userStats.unlockedSector];
            document.getElementById('xp-bar').style.width = `${(userStats.xp / XP_PER_LEVEL) * 100}%`;
        }

        function showUnlockModal(sectorId) {
            document.getElementById('unlock-desc').innerText = sectorNames[sectorId];
            document.getElementById('sector-unlock-modal').style.display = 'flex';
        }

        function closeUnlockModal() {
            document.getElementById('sector-unlock-modal').style.display = 'none';
        }

        function renderRandomLesson() {
            let currentLessonIndex = getNextQuestionIndex();
            const lesson = lessons[currentLessonIndex];
            
            let html = `
                <span class="lesson-tag">Sektor ${lesson.s} • ${lesson.tag}</span>
                <h2>${lesson.t}</h2>
                <p>${lesson.c}</p>
                <div id="options-container">
                    ${lesson.o.map((opt, index) => `
                        <div class="quiz-option" onclick="checkAnswer(${index}, this, ${lesson.a})">${opt}</div>
                    `).join('')}
                </div>
                <button class="next-btn" id="next-btn" onclick="nextLesson()">Następne Wyzwanie (+${XP_REWARD} XP)</button>
            `;
            document.getElementById('lesson-card').innerHTML = html;
        }

        function checkAnswer(selectedIndex, element, correctIndex) {
            const options = document.querySelectorAll('.quiz-option');
            options.forEach(opt => opt.style.pointerEvents = 'none'); 

            if (selectedIndex === correctIndex) {
                element.classList.add('correct');
                if (navigator.vibrate) navigator.vibrate(50);
                document.getElementById('next-btn').style.display = 'block';
            } else {
                element.classList.add('wrong');
                options[correctIndex].classList.add('correct');
                if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
                document.getElementById('next-btn').innerText = "Zapamiętam (Dalej)";
                document.getElementById('next-btn').style.display = 'block';
                element.dataset.wrong = "true"; 
            }
        }

        function nextLesson() {
            const options = document.querySelectorAll('.quiz-option');
            let gotItWrong = false;
            options.forEach(opt => { if(opt.dataset.wrong === "true") gotItWrong = true; });

            if (!gotItWrong) addXP(XP_REWARD);
            renderRandomLesson();
        }

        initApp();
    </script>
</body>
</html>
